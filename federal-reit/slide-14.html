<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slide 14 — Let's Stay Connected</title>
  <link rel="stylesheet" href="cps-theme.css">
  <style>
    .cta-stage {
      flex: 1; display: flex; flex-direction: column;
      justify-content: center; gap: var(--sp-4);
    }
    .cta-headline {
      font-family: 'Roboto Condensed', sans-serif; font-weight: 700;
      font-size: var(--fs-3xl); line-height: var(--lh-tight);
      text-transform: uppercase; color: var(--cp-white); max-width: 2200px;
    }
    .cta-headline em { font-style: normal; color: var(--cp-red); }
    .contact-grid { display: flex; gap: var(--sp-6); flex-wrap: wrap; }
    .contact-item { display: flex; align-items: center; gap: var(--sp-3); }
    .contact-icon {
      width: 88px; height: 88px; border-radius: var(--radius-md);
      background: var(--cp-red); display: flex; align-items: center;
      justify-content: center; flex-shrink: 0;
    }
    .contact-detail { display: flex; flex-direction: column; gap: 10px; }
    .contact-type {
      font-family: 'Roboto Condensed', sans-serif; font-size: var(--fs-xs);
      font-weight: 700; text-transform: uppercase; letter-spacing: 0.14em;
      color: var(--cp-gray-500);
    }
    .contact-value {
      font-family: 'Roboto Condensed', sans-serif; font-size: var(--fs-md);
      font-weight: 700; color: var(--cp-white); text-transform: uppercase;
      letter-spacing: 0.02em;
    }
    .urgency-tag {
      display: inline-flex; align-items: center; gap: var(--sp-2);
      padding: 20px 48px; background: rgba(195,31,47,0.15);
      border: var(--stroke-thin) solid var(--cp-red);
      border-radius: var(--radius-pill); font-family: 'Roboto Condensed', sans-serif;
      font-size: var(--fs-sm); font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.10em; color: var(--cp-white);
    }
    .urgency-dot {
      width: 20px; height: 20px; border-radius: 50%;
      background: var(--cp-red); animation: cps-flash 1.4s ease-in-out infinite;
    }
  </style>
</head>
<body>
  <div class="slide-canvas" id="slide">
    <div class="cps-tri-navy"></div>
    <div class="cps-tri-red"></div>
    <div class="cps-bar-bottom"></div>
    <div style="position:absolute;inset:0;background:linear-gradient(108deg,rgba(19,20,25,1) 0%,rgba(19,20,25,0.95) 50%,rgba(19,20,25,0.55) 68%,transparent 80%);z-index:1;"></div>

    <div class="slide-inner">
      <div class="flex-row" style="justify-content:space-between; margin-bottom: var(--sp-5);">
        <div class="logo-lockup anim-fade-right">
          <img src="../Content/Logos/Critical-Peake-Logo_FA White.png" alt="Critical Peake logo" style="height: 120px; width: auto;">
        </div>
        <div class="urgency-tag anim-fade-left">
          <div class="urgency-dot"></div>
          <span>We Answer Within 3 Rings</span>
        </div>
      </div>

      <div class="cta-stage">
        <p class="t-eyebrow anim-fade-up delay-1">Let's Stay Connected</p>
        <h2 class="cta-headline anim-fade-up delay-2">
          <em>Let's Stay</em><br>Connected
        </h2>
        <div class="divider-red anim-scale-in delay-3"></div>
        <p class="t-body anim-fade-up delay-3" style="max-width:1800px;">
          We answer within 3 rings. Try us.
        </p>

        <div class="contact-grid anim-fade-up delay-4">
          <div class="contact-item">
            <div class="contact-icon">
              <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
                <path d="M14 12 C14 12 18 8 22 8 C26 8 30 14 30 14 L24 22 C24 22 28 28 36 36 L44 30 C44 30 50 34 50 38 C50 42 46 46 46 46 C40 52 14 32 10 22 C8 18 10 14 14 12 Z"
                      stroke="white" stroke-width="5" stroke-linejoin="round" fill="none"/>
              </svg>
            </div>
            <div class="contact-detail">
              <span class="contact-type">Phone</span>
              <span class="contact-value">877-247-9767</span>
            </div>
          </div>
          <div class="contact-item">
            <div class="contact-icon">
              <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
                <path d="M8 12 L32 36 L56 12" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                <rect x="8" y="12" width="48" height="40" rx="4" stroke="white" stroke-width="5" fill="none"/>
              </svg>
            </div>
            <div class="contact-detail">
              <span class="contact-type">Email</span>
              <span class="contact-value">request@criticalpeake.com</span>
            </div>
          </div>
          <div class="contact-item">
            <div class="contact-icon">
              <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
                <circle cx="32" cy="32" r="22" stroke="white" stroke-width="5" fill="none"/>
                <ellipse cx="32" cy="32" rx="10" ry="22" stroke="white" stroke-width="5" fill="none"/>
                <line x1="10" y1="32" x2="54" y2="32" stroke="white" stroke-width="5"/>
              </svg>
            </div>
            <div class="contact-detail">
              <span class="contact-type">Website</span>
              <span class="contact-value">criticalpeake.com</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
  (function () {
    var s = document.getElementById('slide');
    function rescale() {
      var r = Math.min(window.innerWidth / 3840, window.innerHeight / 2160);
      s.style.transform = 'scale(' + r + ')';
      s.style.left = ((window.innerWidth  - 3840 * r) / 2) + 'px';
      s.style.top  = ((window.innerHeight - 2160 * r) / 2) + 'px';
    }
    rescale();
    window.addEventListener('resize', rescale);
  }());
  </script>
<script>
(function(){
  if(window.parent===window)return;
  var fs=document.createElement("style");
  fs.id="deck-freeze";
  fs.textContent="[class*=anim-]{animation:none!important;opacity:0!important}";
  document.head.appendChild(fs);
  window.addEventListener("message",function(e){
    if(e.data==="play"){
      var f=document.getElementById("deck-freeze");
      if(f)f.remove();
      document.querySelectorAll("[class*=anim-]").forEach(function(el){
        el.style.animation="none";
        void el.offsetHeight;
        el.style.animation="";
      });
    }else if(e.data==="freeze"){
      if(!document.getElementById("deck-freeze")){
        var s=document.createElement("style");
        s.id="deck-freeze";
        s.textContent="[class*=anim-]{animation:none!important;opacity:0!important}";
        document.head.appendChild(s);
      }
    }
  });
})();
</script>
</body>
</html>
