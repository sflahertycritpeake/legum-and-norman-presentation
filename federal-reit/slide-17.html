<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slide 17 — Any Questions?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;overflow:hidden}
    .slide-canvas{
      position:absolute;width:3840px;height:2160px;overflow:hidden;
      transform-origin:top left;
    }
    .split{display:flex;width:100%;height:100%}

    /* CPS left half */
    .half-cps{
      flex:1;position:relative;overflow:hidden;
      background:#131419;
      display:flex;align-items:center;justify-content:center;
    }
    .half-cps .tri-navy{
      position:absolute;top:0;right:0;width:0;height:0;
      border-top:2160px solid rgba(37,56,141,0.10);
      border-left:960px solid transparent;
    }
    .half-cps .tri-red{
      position:absolute;bottom:0;right:0;width:0;height:0;
      border-bottom:800px solid rgba(195,31,47,0.08);
      border-left:600px solid transparent;
    }
    .half-cps .bar-bottom{
      position:absolute;bottom:0;left:0;right:0;height:12px;
      background:linear-gradient(90deg,#25388D 0%,#25388D 50%,#C31F2F 50%,#C31F2F 100%);
    }
    .half-cps .content{
      position:relative;z-index:2;
      display:flex;flex-direction:column;align-items:center;gap:60px;
    }
    .half-cps .logo{height:140px;width:auto}
    .half-cps .headline{
      font-family:'Roboto Condensed',sans-serif;font-weight:800;
      font-size:120px;color:#fff;text-transform:uppercase;
      text-align:center;letter-spacing:-0.02em;line-height:1.1;
    }
    .half-cps .headline em{font-style:normal;color:#C31F2F}
    .half-cps .divider{
      width:160px;height:10px;background:#C31F2F;border-radius:5px;
    }

    /* BWEV right half */
    .half-bwev{
      flex:1;position:relative;overflow:hidden;
      background:#0b2a43;
      display:flex;align-items:center;justify-content:center;
    }
    .half-bwev .glow{
      position:absolute;top:50%;left:50%;
      width:1600px;height:1600px;
      background:radial-gradient(circle,rgba(0,114,180,0.18) 0%,transparent 70%);
      transform:translate(-50%,-50%);
    }
    .half-bwev .wave-bg{
      position:absolute;bottom:0;left:0;width:100%;height:900px;
      pointer-events:none;
    }
    .half-bwev .wave-bg svg{width:100%;height:100%}
    .half-bwev .accent-top{
      position:absolute;top:0;left:0;right:0;height:8px;
      background:linear-gradient(90deg,#0072B4,#8DC63F);
    }
    .half-bwev .accent-bottom{
      position:absolute;bottom:0;left:0;right:0;height:8px;
      background:linear-gradient(90deg,#8DC63F,#0072B4);
    }
    .half-bwev .content{
      position:relative;z-index:2;
      display:flex;flex-direction:column;align-items:center;gap:60px;
    }
    .half-bwev .logo{height:140px;width:auto}
    .half-bwev .headline{
      font-family:'Paralucent','Avenir Next',Avenir,sans-serif;font-weight:700;
      font-size:120px;color:#fff;text-transform:uppercase;
      text-align:center;letter-spacing:-0.02em;line-height:1.1;
    }
    .half-bwev .headline em{font-style:normal;color:#8DC63F}
    .half-bwev .divider{
      width:160px;height:10px;background:#8DC63F;border-radius:5px;
    }

    /* Center divider line */
    .center-line{
      position:absolute;top:0;bottom:0;left:50%;width:4px;
      background:rgba(255,255,255,0.08);z-index:5;transform:translateX(-50%);
    }

    /* Chat icon shared */
    .chat-icon{
      width:120px;height:120px;opacity:0.5;
    }
    .chat-icon-cps{stroke:#C31F2F;fill:none;stroke-width:5;stroke-linejoin:round}
    .chat-icon-cps circle{fill:#C31F2F;stroke:none}
    .chat-icon-bwev{stroke:#8DC63F;fill:none;stroke-width:5;stroke-linejoin:round}
    .chat-icon-bwev circle{fill:#8DC63F;stroke:none}

    /* Animations */
    .anim-fade-up{opacity:0;animation:fadeUp 0.6s ease-out forwards}
    .anim-scale-in{opacity:0;animation:scaleIn 0.5s ease-out forwards}
    .anim-fade-left{opacity:0;animation:fadeLeft 0.6s ease-out forwards}
    .anim-fade-right{opacity:0;animation:fadeRight 0.6s ease-out forwards}
    @keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
    @keyframes scaleIn{from{opacity:0;transform:scale(0.8)}to{opacity:1;transform:scale(1)}}
    @keyframes fadeLeft{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
    @keyframes fadeRight{from{opacity:0;transform:translateX(-30px)}to{opacity:1;transform:translateX(0)}}
    .delay-1{animation-delay:0.15s}
    .delay-2{animation-delay:0.30s}
    .delay-3{animation-delay:0.45s}
    .delay-4{animation-delay:0.60s}
  </style>
</head>
<body>
  <div class="slide-canvas" id="slide">
    <div class="split">
      <!-- CPS Left Half -->
      <div class="half-cps">
        <div class="tri-navy"></div>
        <div class="tri-red"></div>
        <div class="bar-bottom"></div>
        <div class="content">
          <img class="logo anim-scale-in delay-1" src="../Content/Logos/Critical-Peake-Logo_FA White.png" alt="Critical Peake logo">
          <svg class="chat-icon anim-fade-up delay-2" viewBox="0 0 120 120">
            <path class="chat-icon-cps" d="M20 25 C20 20 24 16 29 16 L91 16 C96 16 100 20 100 25 L100 72 C100 77 96 81 91 81 L65 81 L48 98 L48 81 L29 81 C24 81 20 77 20 72 Z"/>
            <circle class="chat-icon-cps" cx="42" cy="48" r="6"/>
            <circle class="chat-icon-cps" cx="60" cy="48" r="6"/>
            <circle class="chat-icon-cps" cx="78" cy="48" r="6"/>
          </svg>
          <div class="divider anim-scale-in delay-3"></div>
          <h2 class="headline anim-fade-up delay-3">ANY<br><em>QUESTIONS?</em></h2>
        </div>
      </div>

      <!-- BWEV Right Half -->
      <div class="half-bwev">
        <div class="glow"></div>
        <div class="wave-bg">
          <svg viewBox="0 0 1920 900" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M0,500 C290,400 630,560 970,420 C1310,280 1630,500 1920,380 L1920,900 L0,900 Z" fill="#0072B4" opacity="0.17"/>
            <path d="M0,620 C310,500 680,660 1020,520 C1360,380 1680,580 1920,480 L1920,900 L0,900 Z" fill="#0072B4" opacity="0.27"/>
            <path d="M0,750 C230,690 500,790 800,730 C1100,670 1420,770 1920,710 L1920,900 L0,900 Z" fill="rgba(11,42,67,0.83)"/>
          </svg>
        </div>
        <div class="accent-top"></div>
        <div class="accent-bottom"></div>
        <div class="content">
          <img class="logo anim-scale-in delay-1" src="../Content/Logos/BlueWhale_LogoCMYK_white.png" alt="Blue Whale EV logo">
          <svg class="chat-icon anim-fade-up delay-2" viewBox="0 0 120 120">
            <path class="chat-icon-bwev" d="M20 25 C20 20 24 16 29 16 L91 16 C96 16 100 20 100 25 L100 72 C100 77 96 81 91 81 L65 81 L48 98 L48 81 L29 81 C24 81 20 77 20 72 Z"/>
            <circle class="chat-icon-bwev" cx="42" cy="48" r="6"/>
            <circle class="chat-icon-bwev" cx="60" cy="48" r="6"/>
            <circle class="chat-icon-bwev" cx="78" cy="48" r="6"/>
          </svg>
          <div class="divider anim-scale-in delay-3"></div>
          <h2 class="headline anim-fade-up delay-3">ANY<br><em>QUESTIONS?</em></h2>
        </div>
      </div>

      <div class="center-line"></div>
    </div>
  </div>

  <script>
  (function () {
    var s = document.getElementById('slide');
    function rescale() {
      var r = Math.min(window.innerWidth / 3840, window.innerHeight / 2160);
      s.style.transform = 'scale(' + r + ')';
      s.style.left = ((window.innerWidth  - 3840 * r) / 2) + 'px';
      s.style.top  = ((window.innerHeight - 2160 * r) / 2) + 'px';
    }
    rescale();
    window.addEventListener('resize', rescale);
  }());
  </script>
<script>
(function(){
  if(window.parent===window)return;
  var fs=document.createElement("style");
  fs.id="deck-freeze";
  fs.textContent="[class*=anim-]{animation:none!important;opacity:0!important}";
  document.head.appendChild(fs);
  window.addEventListener("message",function(e){
    if(e.data==="play"){
      var f=document.getElementById("deck-freeze");
      if(f)f.remove();
      document.querySelectorAll("[class*=anim-]").forEach(function(el){
        el.style.animation="none";
        void el.offsetHeight;
        el.style.animation="";
      });
    }else if(e.data==="freeze"){
      if(!document.getElementById("deck-freeze")){
        var s=document.createElement("style");
        s.id="deck-freeze";
        s.textContent="[class*=anim-]{animation:none!important;opacity:0!important}";
        document.head.appendChild(s);
      }
    }
  });
})();
</script>
</body>
</html>
