  <link rel="stylesheet" href="bwev-theme.css">

  <style>
    .challenge-layout {
      display: flex; gap: var(--sp-5); flex: 1; align-items: stretch;
    }
    .challenge-left {
      flex: 0 0 48%; display: flex; flex-direction: column;
      justify-content: center; gap: var(--sp-4);
    }
    .challenge-right {
      flex: 1; display: flex; flex-direction: column;
      justify-content: center; align-items: center; gap: var(--sp-3);
    }

    .stat-hero {
      display: flex; align-items: center; gap: var(--sp-3);
    }
    .stat-number {
      font-family: 'Paralucent', 'Avenir Next', Avenir, sans-serif;
      font-weight: 700; font-size: 420px; line-height: 1;
      color: var(--bw-white);
      text-shadow: 0 0 120px rgba(141,198,63,0.25);
    }
    .stat-text {
      display: flex; flex-direction: column; gap: 8px;
    }
    .stat-label {
      font-family: 'Paralucent', 'Avenir Next', Avenir, sans-serif;
      font-weight: 700; font-size: var(--fs-3xl); line-height: 1;
      color: var(--bw-white); text-transform: uppercase;
    }
    .stat-sub {
      font-family: 'Avenir Next', Avenir, sans-serif;
      font-size: var(--fs-xl); color: rgba(255,255,255,0.5);
      font-weight: 600;
    }

    .pain-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: var(--sp-2);
    }
    .pain-item {
      display: flex; align-items: center; gap: var(--sp-2);
      padding: var(--sp-2) var(--sp-2);
      background: rgba(195,31,47,0.08);
      border: 2px solid rgba(195,31,47,0.20);
      border-left: 8px solid rgba(195,31,47,0.50);
      border-radius: var(--radius-md);
    }
    .pain-icon {
      width: 64px; height: 64px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .pain-icon i {
      font-size: 36px; color: #e04050;
    }
    .pain-text {
      font-family: 'Avenir Next', Avenir, sans-serif;
      font-size: 44px; color: var(--bw-white); line-height: 1.3; opacity: 0.85;
    }

    .charger-grid {
      display: grid; grid-template-columns: repeat(10, 1fr);
      gap: 16px; width: 100%;
    }
    .charger-dot {
      width: 100%; aspect-ratio: 1;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }
    .charger-dot.working {
      background: rgba(141,198,63,0.25);
      border: 3px solid rgba(141,198,63,0.40);
    }
    .charger-dot.failing {
      background: rgba(195,31,47,0.25);
      border: 3px solid rgba(195,31,47,0.45);
    }
    .charger-dot svg {
      width: 55%; height: 55%;
      stroke-width: 4; fill: none;
      stroke-linecap: round; stroke-linejoin: round;
    }
    .charger-dot.working svg { stroke: #8DC63F; }
    .charger-dot.failing svg { stroke: #e04050; }

    .charger-legend {
      display: flex; gap: var(--sp-4); justify-content: center;
    }
    .legend-item {
      display: flex; align-items: center; gap: 16px;
      font-family: 'Avenir Next', Avenir, sans-serif;
      font-size: 36px; color: rgba(255,255,255,0.6);
    }
    .legend-dot {
      width: 28px; height: 28px; border-radius: 6px;
    }
    .legend-dot.green { background: rgba(141,198,63,0.5); border: 3px solid #8DC63F; }
    .legend-dot.red { background: rgba(195,31,47,0.5); border: 3px solid #e04050; }

    .solution-cta {

      padding: var(--sp-2) var(--sp-4);
      background: linear-gradient(135deg, rgba(141,198,63,0.12) 0%, rgba(0,114,180,0.12) 100%);

      border-radius: var(--radius-lg);

    }
    .solution-arrow {

      background: var(--bw-green); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .solution-arrow svg {

    .section-header { margin-bottom: var(--sp-2); }

  <script>
  (function () {
    var s = document.getElementById('slide');
    function rescale() {
      var r = Math.min(window.innerWidth / 3840, window.innerHeight / 2160);
      s.style.transform = 'scale(' + r + ')';
      s.style.left = ((window.innerWidth  - 3840 * r) / 2) + 'px';
      s.style.top  = ((window.innerHeight - 2160 * r) / 2) + 'px';
    }
    rescale();
    window.addEventListener('resize', rescale);
  }());
  </script>
<script>
(function(){
  if(window.parent===window)return;
  var fs=document.createElement("style");
  fs.id="deck-freeze";
  fs.textContent="[class*=anim-]{animation:none!important;opacity:0!important}";
  document.head.appendChild(fs);
  window.addEventListener("message",function(e){
    if(e.data==="play"){
      var f=document.getElementById("deck-freeze");
      if(f)f.remove();
      document.querySelectorAll("[class*=anim-]").forEach(function(el){
        el.style.animation="none";
        void el.offsetHeight;
        el.style.animation="";
      });
    }else if(e.data==="freeze"){
      if(!document.getElementById("deck-freeze")){
        var s=document.createElement("style");
        s.id="deck-freeze";
        s.textContent="[class*=anim-]{animation:none!important;opacity:0!important}";
        document.head.appendChild(s);
      }
    }
  });
})();
