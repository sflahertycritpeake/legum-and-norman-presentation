<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slide 03 — Meet Your Team</title>
  <link rel="stylesheet" href="cps-theme.css">
  <style>
    .team-grid {
      display: flex;
      gap: var(--sp-5);
      flex: 1;
      align-items: stretch;
      justify-content: center;
    }
    .avatar-name {
      font-family: 'Roboto Condensed', sans-serif;
      font-weight: 700; font-size: var(--fs-xl);
      text-transform: uppercase; color: var(--cp-white);
      text-align: center; line-height: 1.1;
    }
    .avatar-role {
      font-family: 'Nunito Sans', sans-serif;
      font-weight: 600; font-size: var(--fs-sm);
      color: var(--cp-red); text-transform: uppercase;
      letter-spacing: 0.10em; text-align: center;
    }
    .avatar-bio {
      font-family: 'Roboto', sans-serif;
      font-size: var(--fs-xs); line-height: var(--lh-loose);
      color: var(--cp-gray-500); text-align: center;
    }
    .section-header {
      display: flex; align-items: flex-end;
      justify-content: space-between;
      margin-bottom: var(--sp-6);
    }
    .headshot-circle {
      width: 320px;
      height: 320px;
      border-radius: 50%;
      overflow: hidden;
      border: var(--stroke-bold) solid var(--cp-red);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--cp-gray-800);
    }
    .headshot-circle img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .headshot-initials {
      font-family: 'Roboto Condensed', sans-serif;
      font-weight: 700;
      font-size: var(--fs-3xl);
      color: var(--cp-gray-500);
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="slide-canvas" id="slide">
    <div class="cps-tri-navy"></div>
    <div class="cps-tri-red"></div>
    <div class="cps-bar-bottom"></div>
    <div style="position:absolute;inset:0;background:linear-gradient(108deg,rgba(19,20,25,0.98) 0%,rgba(19,20,25,0.90) 55%,rgba(19,20,25,0.50) 72%,transparent 85%);z-index:1;"></div>

    <div class="slide-inner full-pad">
      <div class="section-header">
        <div class="flex-col gap-3">
          <p class="t-eyebrow anim-fade-right">L&amp;N Lunch &amp; Learn</p>
          <h2 class="t-h2 anim-fade-up delay-1">MEET YOUR TEAM</h2>
          <div class="divider-red anim-scale-in delay-2"></div>
        </div>
        <div class="logo-lockup anim-fade-left" style="align-self: flex-start;">
          <img src="../Content/Logos/Critical-Peake-Logo_FA White.png" alt="Critical Peake logo" style="height: 120px; width: auto;">
        </div>
      </div>

      <div class="team-grid">
        <div class="avatar-card anim-fade-up delay-2" style="max-width: 900px;">
          <div class="headshot-circle" style="align-self: center;">
            <img src="../Content/headshots/Headshot Jordan MacWha Sqaure.jpg" alt="Jordan MacWha headshot">
          </div>
          <p class="avatar-name">Jordan<br>MacWha</p>
          <p class="avatar-role">Business Development Manager</p>
          <div class="divider-red" style="width:80px; height:6px; align-self:center; margin-top:auto;"></div>
          <p class="avatar-bio">jmacwha@criticalpeake.com</p>
        </div>
        <div class="avatar-card anim-fade-up delay-3" style="max-width: 900px;">
          <div class="headshot-circle" style="align-self: center;">
            <img src="../Content/headshots/Gina Headshot.jpeg" alt="Gina Knokes headshot">
          </div>
          <p class="avatar-name">Gina<br>Knokes</p>
          <p class="avatar-role">Branch Manager</p>
          <div class="divider-red" style="width:80px; height:6px; align-self:center; margin-top:auto;"></div>
          <p class="avatar-bio">gknokes@criticalpeake.com</p>
        </div>
        <div class="avatar-card anim-fade-up delay-4" style="max-width: 900px;">
          <div class="headshot-circle" style="align-self: center;">
            <span class="headshot-initials">BS</span>
          </div>
          <p class="avatar-name">Brian<br>Stumpo</p>
          <p class="avatar-role">Sr. Estimator</p>
          <div class="divider-red" style="width:80px; height:6px; align-self:center; margin-top:auto;"></div>
          <p class="avatar-bio">bstumpo@criticalpeake.com</p>
        </div>
      </div>
    </div>
  </div>

  <script>
  (function () {
    var s = document.getElementById('slide');
    function rescale() {
      var r = Math.min(window.innerWidth / 3840, window.innerHeight / 2160);
      s.style.transform = 'scale(' + r + ')';
      s.style.left = ((window.innerWidth  - 3840 * r) / 2) + 'px';
      s.style.top  = ((window.innerHeight - 2160 * r) / 2) + 'px';
    }
    rescale();
    window.addEventListener('resize', rescale);
  }());
  </script>
<script>
(function(){
  if(window.parent===window)return;
  var fs=document.createElement("style");
  fs.id="deck-freeze";
  fs.textContent="[class*=anim-]{animation:none!important;opacity:0!important}";
  document.head.appendChild(fs);
  window.addEventListener("message",function(e){
    if(e.data==="play"){
      var f=document.getElementById("deck-freeze");
      if(f)f.remove();
      document.querySelectorAll("[class*=anim-]").forEach(function(el){
        el.style.animation="none";
        void el.offsetHeight;
        el.style.animation="";
      });
    }else if(e.data==="freeze"){
      if(!document.getElementById("deck-freeze")){
        var s=document.createElement("style");
        s.id="deck-freeze";
        s.textContent="[class*=anim-]{animation:none!important;opacity:0!important}";
        document.head.appendChild(s);
      }
    }
  });
})();
</script>
</body>
</html>
